services:
  - type: web
    name: aetheris-finale-votes
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /data
    disk:
      name: vote-data
      mountPath: /data
      sizeGB: 1
